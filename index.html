<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>手写数字识别</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.14.0/dist/tf.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        canvas {
            border: 3px solid #333;
            background: white;
            cursor: crosshair;
        }
        .btn-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        #undo { background: #f39c12; }
        #redo { background: #1abc9c; }
        #clear { background: #e74c3c; }
        #predict { background: #3498db; }
        #result {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>✍️ 手写数字识别</h1>
    <canvas id="canvas" width="280" height="280"></canvas>
    <div class="btn-group">
        <button id="undo">撤销 ↶</button>
        <button id="redo">重做 ↺</button>
        <button id="clear">清空 🗑️</button>
        <button id="predict">开始识别 🔍</button>
    </div>
    <div id="result">识别结果：请书写后点击识别</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        
        // 初始化画布
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';

        let history = [];
        let redoStack = [];
        let isDrawing = false;
        let model = null;

        // 保存画布状态
        function saveState() {
            history.push(canvas.toDataURL());
            redoStack = [];
        }
        saveState();

        // 鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            saveState();
        });

        canvas.addEventListener('mouseout', () => isDrawing = false);

        // 撤销/重做
        document.getElementById('undo').addEventListener('click', () => {
            if (history.length > 1) {
                redoStack.push(history.pop());
                const img = new Image();
                img.src = history[history.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        document.getElementById('redo').addEventListener('click', () => {
            if (redoStack.length > 0) {
                const img = new Image();
                img.src = redoStack.pop();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    history.push(img.src);
                };
            }
        });

        document.getElementById('clear').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
            resultDiv.textContent = '识别结果：请书写后点击识别';
        });

        // 加载模型 (这一行是关键，正确加载预训练模型)
        async function loadModel() {
            try {
                model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mnist_transfer_cnn_v1/model.json');
                resultDiv.textContent = '模型加载完成，请书写数字';
            } catch (err) {
                resultDiv.textContent = '模型加载失败';
                console.error(err);
            }
        }
        loadModel();

        // 识别函数
        document.getElementById('predict').addEventListener('click', async () => {
            if (!model) {
                resultDiv.textContent = '模型未加载，请刷新重试';
                return;
            }

            resultDiv.textContent = '识别中...';

            // 1. 创建小画布用于缩放
            const smallCanvas = document.createElement('canvas');
            smallCanvas.width = 28;
            smallCanvas.height = 28;
            const smallCtx = smallCanvas.getContext('2d');
            
            // 2. 抗锯齿缩放
            smallCtx.fillStyle = '#ffffff';
            smallCtx.fillRect(0, 0, 28, 28);
            smallCtx.drawImage(canvas, 0, 0, 280, 280, 0, 0, 28, 28);

            // 3. 预处理图片 (灰度图，归一化)
            const imgData = smallCtx.getImageData(0, 0, 28, 28);
            const pixels = [];
            for (let i = 0; i < imgData.data.length; i += 4) {
                // RGB 转灰度
                const gray = 0.2989 * imgData.data[i] + 0.5870 * imgData.data[i+1] + 0.1140 * imgData.data[i+2];
                pixels.push(255 - gray); // 反色 (MNIST是白底黑字，我们是黑底白字)
            }

            // 4. 转换为 Tensor 并预测
            const tensor = tf.tensor4d(pixels, [1, 28, 28, 1]).div(255.0);
            const prediction = model.predict(tensor);
            const digit = prediction.argMax(1).dataSync()[0];
            const confidence = prediction.max().dataSync()[0];

            // 5. 显示结果
            resultDiv.textContent = `识别结果：${digit} (置信度：${(confidence * 100).toFixed(1)}%)`;

            // 释放内存
            tensor.dispose();
            prediction.dispose();
        });
    </script>
</body>
</html>
